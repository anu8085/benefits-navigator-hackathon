<svg viewBox="0 0 200 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BenefitBridge bridge icon">
  <!-- Road deck -->
  <rect x="5" y="52" width="190" height="5" rx="2" fill="#2E86AB"/>
  <!-- Left tower -->
  <rect x="38" y="20" width="9" height="37" rx="2" fill="#2E86AB"/>
  <!-- Right tower -->
  <rect x="153" y="20" width="9" height="37" rx="2" fill="#2E86AB"/>
  <!-- Main suspension cable arc -->
  <path d="M 42 20 Q 100 3 157 20" stroke="#1a3a4f" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Anchor stays -->
  <line x1="42" y1="20" x2="8" y2="52" stroke="#5ba8c4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="157" y1="20" x2="192" y2="52" stroke="#5ba8c4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Vertical suspenders -->
  <line x1="72" y1="12" x2="72" y2="52" stroke="#5ba8c4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="6" x2="100" y2="52" stroke="#5ba8c4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="128" y1="12" x2="128" y2="52" stroke="#5ba8c4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
